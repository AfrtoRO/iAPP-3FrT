name: Build Unsigned IPA (ZIP)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # حدثتها لـ 20 عشان استقرار أكتر

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Build Unsigned App
        run: |
          cd ios
          # السطر ده هو اللي هيحل خطأ 65
          export NODE_BINARY=$(which node)
          
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath ../build

      - name: Package to IPA and ZIP
        run: |
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r app.ipa Payload
          zip GhostVault.zip app.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostVault-ZIP
          path: build/Build/Products/Release-iphoneos/GhostVault.zip
