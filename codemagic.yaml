workflows:
  ios-unsigned-workflow:
    name: iOS Unsigned Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest
    scripts:
      - name: Install Dependencies
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Build Unsigned App
        script: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk '/Schemes:/{getline; print $1}')
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath ../build
      - name: Package into IPA
        script: |
          cd build/Build/Products/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload/
          zip -r app.ipa Payload
    artifacts:
      - build/Build/Products/Release-iphoneos/app.ipa
